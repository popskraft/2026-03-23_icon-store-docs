<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="robots" content="noindex, nofollow, noarchive, noimageindex, nosnippet">
    <meta name="googlebot" content="noindex, nofollow, noarchive, noimageindex, nosnippet">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-home" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-note">Shared by direct link only. Search engines are asked not to index these pages.</p>
      </div>
    </header>

    <main class="page-shell">
      <article class="card card--document">
        <header class="doc-meta">
          <a class="back-link" href="{{ '/' | relative_url }}">All documents</a>
          <h1 class="doc-meta__title">{{ page.title | escape }}</h1>
          {% if page.description %}
          <p class="doc-meta__lead">{{ page.description }}</p>
          {% endif %}
          {% if page.source_file %}
          <p class="doc-meta__source">Source: <code>{{ page.source_file }}</code></p>
          {% endif %}
        </header>
        <div class="prose prose--document">
          {{ content }}
        </div>
      </article>
    </main>
  </body>
</html>
