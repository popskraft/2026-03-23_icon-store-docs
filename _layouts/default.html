<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="robots" content="noindex, nofollow, noarchive, noimageindex, nosnippet">
    <meta name="googlebot" content="noindex, nofollow, noarchive, noimageindex, nosnippet">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-home" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-note">Open by direct link. Marked with <code>noindex</code> and blocked in <code>robots.txt</code>.</p>
      </div>
    </header>

    <main class="page-shell">
      <article class="card">
        <header class="card-header">
          <p class="eyebrow">Document Index</p>
          <h1>{{ page.title | escape }}</h1>
          {% if page.description %}
          <p class="lead">{{ page.description }}</p>
          {% endif %}
        </header>
        <div class="prose">
          {{ content }}
        </div>
      </article>
    </main>
  </body>
</html>
